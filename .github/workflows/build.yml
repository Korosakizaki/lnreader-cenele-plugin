name: Build Plugins
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '20'
        
    - name: Build plugins
      run: |
        mkdir -p .dist
        # Create the correct plugins.json manifest for LNReader
        echo '[
          {
            "id": "cenele-arabic",
            "name": "Cenele Arabic",
            "site": "https://cenele.com/",
            "lang": "العربية",
            "version": "1.0.0",
            "url": "https://raw.githubusercontent.com/Korosakizaki/lnreader-cenele-plugin/main/src/ar/cenele/Cenele.js",
            "iconUrl": "https://raw.githubusercontent.com/Korosakizaki/lnreader-cenele-plugin/main/src/ar/cenele/icon.png"
          }
        ]' > .dist/plugins.json
        
        # Create minified version
        cat .dist/plugins.json | tr -d '\n\t ' > .dist/plugins.min.json
        
    - name: Deploy to plugins branch
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./.dist
        publish_branch: plugins
